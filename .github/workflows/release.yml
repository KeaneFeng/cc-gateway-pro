name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-14
          - os: windows-2022
          - os: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config curl wget file patchelf libssl-dev rpm \
            flatpak flatpak-builder \
            libgtk-3-dev librsvg2-dev libayatana-appindicator3-dev \
            libwebkit2gtk-4.1-dev || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev \
            libsoup-3.0-dev || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        run: pnpm tauri build

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        run: pnpm tauri build

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          
          # Find DMG
          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1 || true)
          if [ -n "$DMG" ]; then
            cp "$DMG" "release-assets/CC-Gateway-Pro_${VERSION}_aarch64.dmg"
            echo "DMG: CC-Gateway-Pro_${VERSION}_aarch64.dmg"
          fi
          
          # Find .app and zip it
          APP=$(find src-tauri/target -name "*.app" -type d | head -1 || true)
          if [ -n "$APP" ]; then
            cd "$(dirname "$APP")"
            ditto -c -k --sequesterRsrc --keepParent "$(basename "$APP")" "$GITHUB_WORKSPACE/release-assets/CC-Gateway-Pro_${VERSION}_macOS.zip"
            cd "$GITHUB_WORKSPACE"
            echo "ZIP: CC-Gateway-Pro_${VERSION}_macOS.zip"
          fi

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME -replace '^v'
          
          # MSI installer
          $msi = Get-ChildItem -Path 'src-tauri/target/release/bundle/msi' -Recurse -Include *.msi | Select-Object -First 1
          if ($msi) {
            Copy-Item $msi.FullName "release-assets/CC-Gateway-Pro_${VERSION}_x64.msi"
            Write-Host "MSI: CC-Gateway-Pro_${VERSION}_x64.msi"
          }
          
          # Portable exe
          $exe = Get-ChildItem -Path 'src-tauri/target/release' -Filter "cc-gateway-pro.exe" | Select-Object -First 1
          if ($exe) {
            $portableDir = "release-assets/CC-Gateway-Pro-Portable"
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exe.FullName $portableDir
            Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/CC-Gateway-Pro_${VERSION}_Windows-Portable.zip" -Force
            Remove-Item -Recurse -Force $portableDir
            Write-Host "Portable: CC-Gateway-Pro_${VERSION}_Windows-Portable.zip"
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME#v}"
          
          # AppImage
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" -type f | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            cp "$APPIMAGE" "release-assets/CC-Gateway-Pro_${VERSION}_x86_64.AppImage"
            echo "AppImage: CC-Gateway-Pro_${VERSION}_x86_64.AppImage"
          fi
          
          # DEB
          DEB=$(find src-tauri/target -name "*.deb" -type f | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/CC-Gateway-Pro_${VERSION}_amd64.deb"
            echo "DEB: CC-Gateway-Pro_${VERSION}_amd64.deb"
          fi
          
          # RPM
          RPM=$(find src-tauri/target -name "*.rpm" -type f | head -1 || true)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-assets/CC-Gateway-Pro_${VERSION}_x86_64.rpm"
            echo "RPM: CC-Gateway-Pro_${VERSION}_x86_64.rpm"
          fi

      - name: List assets
        shell: bash
        run: ls -la release-assets/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ runner.arch }}
          path: release-assets/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List assets
        run: ls -la release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC-Gateway-Pro ${{ github.ref_name }}
          prerelease: false
          body: |
            ## CC-Gateway-Pro ${{ github.ref_name }}
            
            多供应商聚合网关，用于 Claude Code
            
            ### 下载
            
            - **macOS (Apple Silicon)**: `CC-Gateway-Pro_*_aarch64.dmg` 或 `CC-Gateway-Pro_*_macOS.zip`
            - **Windows**: `CC-Gateway-Pro_*_x64.msi` 或 `CC-Gateway-Pro_*_Windows-Portable.zip`
            - **Linux**: `CC-Gateway-Pro_*_x86_64.AppImage` / `.deb` / `.rpm`
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
