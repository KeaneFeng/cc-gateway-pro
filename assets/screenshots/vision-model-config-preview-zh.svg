<svg width="1440" height="840" viewBox="0 0 1440 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Vision Model 配置界面预览</title>
  <desc id="desc">展示编辑供应商时配置模型映射、默认兜底模型和视觉模型的界面。</desc>
  <rect width="1440" height="840" fill="#0A0A0A"/>
  <rect x="24" y="24" width="1392" height="792" rx="18" fill="#FFFFFF"/>
  <circle cx="56" cy="57" r="8" fill="#FF5F57"/>
  <circle cx="80" cy="57" r="8" fill="#FFBD2E"/>
  <circle cx="104" cy="57" r="8" fill="#28C840"/>
  <rect x="58" y="94" width="44" height="44" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <path d="M84 105L73 116L84 127" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M75 116H92" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round"/>
  <text x="124" y="126" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">编辑供应商</text>

  <line x1="56" y1="166" x2="56" y2="732" stroke="#E5E7EB" stroke-width="1.5"/>
  <line x1="1340" y1="166" x2="1340" y2="732" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="88" y="202" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">模型映射</text>
  <text x="88" y="236" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="16">显示名称只影响 /model 菜单；1M 只是给 Claude Code 的上下文能力声明。</text>
  <rect x="1035" y="178" width="118" height="40" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="1066" y="204" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">一键设置</text>
  <rect x="1168" y="178" width="142" height="40" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="1196" y="204" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">获取模型列表</text>

  <text x="88" y="286" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">模型角色</text>
  <text x="250" y="286" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">显示名称</text>
  <text x="710" y="286" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">实际请求模型</text>
  <text x="1180" y="286" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">声明支持 1M</text>

  <g>
    <rect x="88" y="310" width="150" height="46" rx="9" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="104" y="340" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Sonnet</text>
    <rect x="250" y="310" width="448" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="270" y="340" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5-pro</text>
    <rect x="710" y="310" width="448" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="730" y="340" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5-pro</text>
    <circle cx="1189" cy="333" r="11" fill="#2F8CFF"/>
    <path d="M1183 333L1188 338L1198 326" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1208" y="340" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="18">1M</text>
  </g>
  <g>
    <rect x="88" y="374" width="150" height="46" rx="9" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="104" y="404" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Opus</text>
    <rect x="250" y="374" width="448" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="270" y="404" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5-pro</text>
    <rect x="710" y="374" width="448" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="730" y="404" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5-pro</text>
    <circle cx="1189" cy="397" r="11" fill="#2F8CFF"/>
    <path d="M1183 397L1188 402L1198 390" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="1208" y="404" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="18">1M</text>
  </g>
  <g>
    <rect x="88" y="438" width="150" height="46" rx="9" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="104" y="468" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="700">Haiku</text>
    <rect x="250" y="438" width="448" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="270" y="468" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5-pro</text>
    <rect x="710" y="438" width="448" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
    <text x="730" y="468" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5-pro</text>
  </g>

  <line x1="88" y1="522" x2="1310" y2="522" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="88" y="568" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">默认兜底模型</text>
  <rect x="88" y="592" width="1222" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="108" y="622" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5</text>
  <text x="88" y="666" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="16">仅在 Claude Code 请求没有明确落到 Sonnet、Opus 或 Haiku 角色时使用；通常可以留空。</text>

  <line x1="88" y1="694" x2="1310" y2="694" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="88" y="742" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">视觉模型</text>
  <rect x="88" y="766" width="1050" height="46" rx="9" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="108" y="796" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20">mimo-v2.5</text>
  <rect x="1224" y="770" width="116" height="48" rx="14" fill="#2F8CFF"/>
  <text x="1270" y="800" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">保存</text>
</svg>
