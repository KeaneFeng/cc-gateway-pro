<svg width="1440" height="840" viewBox="0 0 1440 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Session Traces 设置界面预览</title>
  <desc id="desc">展示 Session Traces 默认关闭、开启开关、采集模式和本地保留策略。</desc>
  <rect width="1440" height="840" fill="#F8FAFC"/>
  <rect x="24" y="24" width="1392" height="792" rx="18" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="56" cy="57" r="8" fill="#FF5F57"/>
  <circle cx="80" cy="57" r="8" fill="#FFBD2E"/>
  <circle cx="104" cy="57" r="8" fill="#28C840"/>
  <rect x="58" y="94" width="44" height="44" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="2"/>
  <path d="M84 105L73 116L84 127" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M75 116H92" stroke="#6B7280" stroke-width="2.5" stroke-linecap="round"/>
  <text x="124" y="126" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">高级设置</text>

  <rect x="56" y="166" width="286" height="598" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="84" y="206" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">设置分组</text>
  <rect x="78" y="232" width="238" height="44" rx="10" fill="#FFFFFF"/>
  <text x="100" y="260" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="17">目录配置</text>
  <rect x="78" y="288" width="238" height="44" rx="10" fill="#FFFFFF"/>
  <text x="100" y="316" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="17">备份与同步</text>
  <rect x="78" y="344" width="238" height="44" rx="10" fill="#FFFFFF"/>
  <text x="100" y="372" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="17">日志配置</text>
  <rect x="78" y="400" width="238" height="48" rx="10" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <circle cx="102" cy="424" r="7" fill="#2F8CFF"/>
  <text x="124" y="430" fill="#1D4ED8" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Session Traces</text>
  <rect x="78" y="460" width="238" height="44" rx="10" fill="#FFFFFF"/>
  <text x="100" y="488" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="17">OAuth 认证中心</text>

  <rect x="374" y="166" width="966" height="598" rx="14" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="414" y="216" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Session Traces</text>
  <text x="414" y="246" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="16">控制会话上下文分析采集。默认关闭，仅在开启后记录新的请求。</text>

  <line x1="414" y1="282" x2="1300" y2="282" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="414" y="330" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">启用 Session Traces</text>
  <text x="414" y="358" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="16">开启后才会记录新的会话上下文摘要、工具调用和每轮 usage。</text>
  <rect x="1228" y="318" width="72" height="36" rx="18" fill="#2F8CFF"/>
  <circle cx="1278" cy="336" r="15" fill="#FFFFFF"/>

  <line x1="414" y1="398" x2="1300" y2="398" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="414" y="446" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700">采集模式</text>
  <text x="414" y="474" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="16">Summary 保存提取字段；Full 保存脱敏后的 request/response JSON。</text>
  <rect x="1150" y="426" width="150" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="1184" y="454" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700">Summary</text>
  <path d="M1268 443L1276 451L1284 443" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="414" y="522" width="886" height="112" rx="12" fill="#F8FAFC" stroke="#E5E7EB" stroke-width="1.5"/>
  <circle cx="445" cy="555" r="12" fill="#DCFCE7"/>
  <path d="M439 555L444 560L452 549" stroke="#16A34A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="474" y="560" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">Session Traces 默认关闭，数据只保存在本机。敏感 key 会被脱敏，但开启前仍应确认这是可信设备。</text>
  <text x="474" y="596" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15">默认保留 14 天 · 响应预览 2000 字符</text>
  <text x="474" y="622" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="15">本地示例路径：/Users/demo/.cc-gateway-pro/cc-gateway-pro.db</text>

  <rect x="414" y="672" width="520" height="48" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="438" y="702" fill="#6B7280" font-family="Arial, Helvetica, sans-serif" font-size="16">示例代理 URL：https://api.demo.local/v1/messages</text>
  <rect x="1146" y="672" width="154" height="48" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.5"/>
  <text x="1178" y="702" fill="#9CA3AF" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">清理旧 Traces</text>
</svg>
